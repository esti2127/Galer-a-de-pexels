<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <link rel="stylesheet" href="css/main.css">
  <title>Galería de pexels</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  
</head>


<body>
  <header class="encabezadoFavoritos">

    <h1 class="tituloGaleria">Galería de Pexels</h1>

    <!-- Formulario que englobe: -->


    <button id="botonFavoritos">Mis Favoritos</button>

  </header>

  <main> <!-- Buscador de imágenes por palabras clave -->
    <div id="contenedorSearch">
      <input type="text" id="entradaBusqueda" placeholder="Buscar" />
      <button type="submit" id="botonBuscar">Buscar</button>
    </div>
    <!-- Filtro por orientación:Todas, Verticales, Horizontales. -->
      <label for="orientacion">Orientación:</label>
      <select class="orientacion" id="orientacion" name="orientacion">
        <option value="all">Todas</option>
        <option value="portrait">Vertical</option>
        <option value="landscape">Horizontal</option>
      </select>
      <button id="imagenesOrientacion" type="submit">Filtrar</button>


    <!-- Sección de categorías -->

    <section class="contenedorBotones" id="contenedorBotones"></section>

    <!-- Galería -->

    <div id="mostrarImagenes" class="grid-fotos"></div>


    <nav id="paginacion" class="paginacion"></nav>

  </main>


  <!-- {
  "page": 2,
  "per_page": 40,
  "total_results": 8000,
  "next_page": "https://api.pexels.com/v1/curated?page=3&per_page=40",
  "prev_page": "https://api.pexels.com/v1/curated?page=1&per_page=40"
} -->

  <script src="js/main.js"></script>

</body>
